<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>slipstream spike — encoder path gate</title>
    <style>
      body { font: 13px/1.5 ui-monospace, monospace; background: #0a0d14; color: #f2f5fa; margin: 0; display: flex; }
      #log { padding: 16px; width: 50vw; box-sizing: border-box; overflow: auto; height: 100vh; }
      #log div { white-space: pre-wrap; }
      .ok { color: #0088f8; }
      .bad { color: #ff5c5c; }
      model-viewer { width: 50vw; height: 100vh; background: #11151f; border-left: 1px solid rgba(255,255,255,.08); }
    </style>
  </head>
  <body>
    <div id="log"></div>
    <model-viewer id="mv" camera-controls auto-rotate exposure="1" shadow-intensity="1"></model-viewer>
    <script type="module" src="/spike/main.js"></script>
  </body>
</html>
